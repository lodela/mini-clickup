name: CD - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  AZURE_WEBAPP_NAME: 'mini-clickup'

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      - name: Run all tests
        run: npm run test

  build:
    name: Build Production
    runs-on: windows-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Build server
        run: cd server && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            client/dist/
            server/dist/
          retention-days: 7

  deploy-iis:
    name: Deploy to Windows IIS
    runs-on: windows-latest
    needs: build
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: ./deploy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production dependencies
        run: |
          cd deploy/server
          npm ci --production

      - name: Copy web.config files
        run: |
          Copy-Item -Path "server/web.config" -Destination "deploy/server/web.config"
          Copy-Item -Path "client/web.config" -Destination "deploy/client/web.config"

      - name: Deploy to IIS via Web Deploy
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.IIS_PUBLISH_PROFILE }}
          package: ./deploy

      - name: Run database migrations
        run: |
          cd deploy/server
          npm run migrate
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NODE_ENV: production

      - name: Health check
        run: |
          $maxRetries = 5
          $retryCount = 0
          do {
            try {
              $response = Invoke-WebRequest -Uri "${{ secrets.PRODUCTION_URL }}/api/health" -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "✅ Health check passed"
                exit 0
              }
            } catch {
              Write-Host "Health check failed, retrying..."
            }
            $retryCount++
            Start-Sleep -Seconds 10
          } while ($retryCount -lt $maxRetries)
          Write-Error "Health check failed after $maxRetries attempts"
          exit 1

  rollback:
    name: Rollback on Failure
    runs-on: windows-latest
    needs: deploy-iis
    if: failure()
    
    steps:
      - name: Notify rollback
        run: |
          Write-Host "❌ Deployment failed, initiating rollback..."
          # Add rollback logic here (restore backup, redeploy previous version)
